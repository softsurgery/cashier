<h1>Families</h1>

<hlm-dialog>
  <button hlmDialogTrigger hlmBtn variant="outline">Open Dialog</button>
  <hlm-dialog-content *hlmDialogPortal="let ctx">
    <hlm-dialog-header>
      <h3 hlmDialogTitle>Edit profile</h3>
      <p hlmDialogDescription>Make changes to your profile here. Click save when you're done.</p>
    </hlm-dialog-header>
    <hlm-dialog-footer>
      <button hlmBtn variant="outline" hlmDialogClose>Cancel</button>
      <button hlmBtn type="submit">Save changes</button>
    </hlm-dialog-footer>
  </hlm-dialog-content>
</hlm-dialog>

<hlm-sheet side="right">
  <button hlmSheetTrigger hlmBtn variant="outline">Open</button>

  <hlm-sheet-content *hlmSheetPortal="let ctx">
    <hlm-sheet-header>
      <h3 hlmSheetTitle>Edit Profile</h3>
      <p hlmSheetDescription>Edit your information.</p>
    </hlm-sheet-header>

    <hlm-sheet-footer>
      <button hlmBtn type="submit">Save Changes</button>
      <button hlmSheetClose hlmBtn variant="outline">Close</button>
    </hlm-sheet-footer>
  </hlm-sheet-content>
</hlm-sheet>
