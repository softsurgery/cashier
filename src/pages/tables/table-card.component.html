<mat-card
  class="m-2 transition-shadow duration-200 hover:shadow-lg dark:text-gray-100"
  [ngClass]="statusClass"
>
  <mat-card-header class="relative">
    <mat-card-title class="flex items-center gap-2"> Table {{ table.number }} </mat-card-title>
    <div class="absolute top-2 right-2 flex gap-1">
      <button mat-icon-button (click)="onEdit()">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="onDelete()">
        <mat-icon>delete</mat-icon>
      </button>
    </div>
  </mat-card-header>

  <mat-card-content>
    <div class="flex gap-2 mt-2">
      <button *ngFor="let s of statuses" [ngClass]="getStatusBtnClass(s)" (click)="changeStatus(s)">
        {{ s | titlecase }}
      </button>
    </div>
  </mat-card-content>
</mat-card>
