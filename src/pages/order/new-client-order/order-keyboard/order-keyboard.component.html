<div class="w-full h-full flex flex-col gap-3 p-3">
  <!-- Input -->
  <input
    type="text"
    [(ngModel)]="value"
    class="w-full border rounded-md px-3 py-2 text-right text-xl font-semibold focus:outline-none focus:ring-2 focus:ring-primary"
    placeholder="0"
  />

  <div class="flex flex-row gap-3 flex-1">
    <!-- Keypad -->
    <div class="grid grid-cols-3 gap-2 flex-1">
      <button
        hlmBtn
        size="lg"
        *ngFor="let key of keys"
        (click)="press(key)"
        class="w-full h-full text-lg font-semibold"
      >
        {{ key === 'x' ? '⌫' : key }}
      </button>
    </div>

    <!-- Actions -->
    <div class="flex flex-col gap-2 w-36">
      <button
        hlmBtn
        variant="destructive"
        size="lg"
        (click)="clear()"
        [disabled]="isEmpty()"
        class="flex-1"
      >
        Clear
      </button>

      <button
        hlmBtn
        variant="default"
        size="lg"
        (click)="logPay()"
        [disabled]="!isEmpty()"
        class="flex-1"
      >
        Fully Pay
      </button>

      <button
        hlmBtn
        variant="secondary"
        size="lg"
        (click)="logPay()"
        [disabled]="isEmpty()"
        class="flex-1"
      >
        Partially Pay
      </button>
    </div>
  </div>
</div>
