<div class="overflow-hidden flex flex-col md:flex-row gap-6 p-4">
  <div class="w-full md:w-48 flex-shrink-0">
    <div class="space-y-2">
      <div
        *ngFor="let family of data | async"
        class="p-3 rounded-lg border-2 cursor-pointer transition-all hover:shadow-md"
        [class.bg-primary]="selectedFamily === family"
        [class.text-primary-foreground]="selectedFamily === family"
        [class.border-primary]="selectedFamily === family"
        (click)="selectFamily(family)"
      >
        {{ family.name }}
      </div>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto">
    <div *ngIf="selectedFamily" class="flex flex-wrap gap-4">
      <div
        *ngFor="let product of selectedFamily.products"
        class="p-4 rounded-lg border-2 transition-all hover:shadow-md w-36 h-24 flex flex-col justify-between bg-card cursor-pointer"
        (click)="addToCart(product)"
      >
        <h3 class="font-bold text-xs">{{ product.name }}</h3>
        <span class="text-xs px-2 py-1 rounded font-medium w-fit"> {{ product.price }} TTC </span>
      </div>
    </div>
  </div>

  <div class="w-full md:w-80 flex-shrink-0">
    <div class="border rounded-lg p-4 bg-card flex flex-col h-96 md:h-[75vh]">
      <h2 class="font-bold text-lg mb-4">Panier</h2>
      <div class="flex-1 overflow-y-auto min-h-0">
        <div *ngIf="cart.length === 0" class="text-muted-foreground text-center py-8">
          Panier vide
        </div>
        <div *ngFor="let item of cart" class="flex justify-between items-center py-2 border-b">
          <div class="flex-1">
            <span class="text-sm">{{ item.product.name }}</span>
            <span class="text-s text-muted-foreground ml-2">x{{ item.quantity }}</span>
          </div>
          <div class="text-right">
            <div>{{ item.product.price * item.quantity }} TTC</div>
          </div>
        </div>
      </div>
      <div class="flex justify-between items-center pt-4 font-bold text-lg border-t mt-2">
        <span>Total</span>
        <span>{{ cartTotal }} TTC</span>
      </div>
    </div>
  </div>
</div>
